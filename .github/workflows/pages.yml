name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare static site
        run: |
          mkdir -p .pages-build
          rsync -a --copy-links \
            --exclude node_modules \
            --exclude .git \
            --exclude .cursor \
            --exclude .pages-build \
            ./ .pages-build/
          test -f .pages-build/v3/index.html
          test -f .pages-build/v3/css/tokens.css
          test -f .pages-build/v4/index.html
          test -f .pages-build/v4/css/tokens.css
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .pages-build
      - id: deployment
        uses: actions/deploy-pages@v4
